<!DOCTYPE html>
<html lang="ja">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="サービス別プリセットに対応した、ブラウザで動作する安全なパスワード生成ツール">
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src data:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
		<meta name="referrer" content="no-referrer">
		<title>Password Generator</title>
		<link rel="stylesheet" href="css/style.css">
	</head>

	<body>
		<div class="app-wrapper">

			<header class="app-header">
				<h1>Password Generator</h1>
				<p>サービスごとの記号ポリシーに対応したパスワード生成ツール</p>
				<button type="button" id="btn-theme-toggle" class="theme-toggle-btn" aria-label="ダークモードに切り替え"
					aria-pressed="false">
					<span class="theme-toggle-icon" aria-hidden="true">🌙</span>
					<span class="theme-toggle-label">ダーク</span>
				</button>
			</header>

		<!-- セキュリティバー -->
		<div class="security-bar" role="note" aria-label="セキュリティ情報">
			<ul class="security-strip">
				<li class="security-item">Web Crypto API で乱数生成（Math.random 不使用）</li>
				<li class="security-item">完全クライアントサイド完結 — パスワードを外部サーバーへ送信しません</li>
				<li class="security-item">パスワードを端末に保存しません</li>
			</ul>
		</div>

			<main>
				<div class="main-layout">

					<!-- ── 設定パネル1: 文字種・プリセット ──────────── -->
					<section class="card" aria-label="文字種とプリセット設定">

						<!-- 文字種 -->
						<h3 class="section-title">文字種</h3>
						<div class="form-group">
							<div class="toggle-row">
								<label class="toggle-label" for="use-upper">大文字 (A-Z)</label>
								<label class="toggle-switch">
									<input type="checkbox" id="use-upper" checked>
									<span class="toggle-track" aria-hidden="true"></span>
								</label>
							</div>
							<div class="toggle-row">
								<label class="toggle-label" for="use-lower">小文字 (a-z)</label>
								<label class="toggle-switch">
									<input type="checkbox" id="use-lower" checked>
									<span class="toggle-track" aria-hidden="true"></span>
								</label>
							</div>
							<div class="toggle-row">
								<label class="toggle-label" for="use-digits">数字 (0-9)</label>
								<label class="toggle-switch">
									<input type="checkbox" id="use-digits" checked>
									<span class="toggle-track" aria-hidden="true"></span>
								</label>
							</div>
							<div class="toggle-row">
								<label class="toggle-label" for="use-symbols">記号</label>
								<label class="toggle-switch">
									<input type="checkbox" id="use-symbols" checked>
									<span class="toggle-track" aria-hidden="true"></span>
								</label>
							</div>
						</div>

						<hr class="divider">

						<!-- 記号プリセット -->
						<h3 class="section-title">記号プリセット</h3>
						<div class="form-group">
							<div id="generic-preset" class="preset-group" role="group" aria-label="汎用プリセット"></div>

							<label for="service-preset" class="section-title service-preset-label">サービス別</label>
							<select id="service-preset" class="select" aria-label="サービス別プリセットを選択"></select>
							<p id="service-preset-note" class="service-note" aria-live="polite"></p>
						</div>

					</section>

					<!-- ── 設定パネル2: 記号・パスワード長・除外文字 ── -->
					<section class="card" aria-label="記号・パスワード長・除外文字">

						<!-- 記号 個別選択 -->
						<h3 class="section-title">記号</h3>
						<div id="symbol-grid" class="symbol-grid" role="group" aria-label="使用する記号を個別に選択"></div>

						<hr class="divider">

						<!-- パスワード長 -->
						<h3 class="section-title">パスワード長</h3>
						<div class="form-group">
							<div class="length-row">
								<input type="range" id="length-slider" class="length-slider" min="8" max="64" value="16"
									aria-label="パスワード長" aria-valuemin="8" aria-valuemax="64" aria-valuenow="16">
								<input type="number" id="length-number" class="length-number" min="8" max="64"
									value="16" aria-label="パスワード長（数値入力）">
							</div>
						</div>

						<hr class="divider">

						<!-- 除外文字 -->
						<h3 class="section-title">除外文字</h3>
						<div class="form-group">
							<div class="input-row">
								<input type="text" id="exclude-input" class="input-text" placeholder="除外したい文字を入力"
									aria-label="除外する文字" autocomplete="off" spellcheck="false">
								<button type="button" id="btn-ambiguous" class="btn btn-secondary"
									aria-label="紛らわしい文字を除外文字にセットする">
									紛らわしい文字
								</button>
							</div>
						</div>

					</section>

					<!-- ── 生成パネル ─────────────────────────────────── -->
					<section class="card" aria-label="パスワード生成">

						<!-- 強度インジケーター -->
						<h3 class="section-title">強度（予測）</h3>
						<div class="strength-row">
							<div id="strength-indicator" class="strength-indicator" role="meter" aria-label="パスワード強度"
								aria-valuemin="0" aria-valuemax="3" aria-valuenow="3" data-level="3"></div>
							<span id="strength-label" class="strength-label" aria-live="polite">—</span>
						</div>

						<hr class="divider">

						<!-- 生成件数 -->
						<h3 class="section-title">生成件数</h3>
						<div class="count-row">
							<span class="count-label" id="count-label">同時に生成する数：</span>
							<select id="generate-count" class="select count-select" aria-labelledby="count-label">
								<option value="1">1件</option>
								<option value="2">2件</option>
								<option value="3" selected>3件</option>
								<option value="4">4件</option>
								<option value="5">5件</option>
							</select>
						</div>

						<!-- 生成ボタン -->
						<button type="button" id="btn-generate" class="btn-generate">
							パスワードを生成
						</button>

						<!-- エラー -->
						<p id="error-message" class="error-message" role="alert" aria-live="assertive"></p>

						<!-- 結果 -->
						<div id="results" role="region" aria-label="生成されたパスワード一覧" aria-live="polite"></div>
					</section>
				</div>
			</main>

		</div>

		<script type="module" src="js/app.js"></script>
	</body>

</html>
